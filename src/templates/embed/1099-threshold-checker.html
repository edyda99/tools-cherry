<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>1099-K / 1099-NEC Threshold Checker — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/1099-threshold-checker/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 560px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .obbba-out .line { display:flex; justify-content:space-between; gap:12px; padding:6px 0; border-bottom:1px solid rgba(128,128,128,.18); }
  .obbba-out .line.big { font-size:1.05rem; font-weight:700; border-bottom:2px solid rgba(128,128,128,.35); }
  .obbba-out .num { font-variant-numeric: tabular-nums; text-align:right; }
  .obbba-note { font-size:.82rem; opacity:.9; margin-top:8px; }
  .warn-flag { color:#b26b00; font-weight:700; }
  .ok-flag { color:#2f6f4f; font-weight:700; }
  .info-flag { color:#2a5d8f; font-weight:600; }
  .takeaway { margin-top:12px; padding:10px 12px; border-left:4px solid #2f6f4f; border-radius:8px; background:rgba(47,111,79,.09); font-size:.82rem; }
  .embed-credit { margin-top:14px; text-align:center; font-size:.85rem; opacity:.9; }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>1099-K / 1099-NEC Threshold Checker</h1>
  <section class="calc" aria-label="1099-K / 1099-NEC threshold checker">
    <form id="f1099Form" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label for="taxYear">Tax year</label>
        <select id="taxYear">
          <option value="2025">2025</option>
          <option value="2026" selected>2026</option>
          <option value="2027">2027</option>
        </select>
      </div>
      <div class="field">
        <label for="payerType">How were you paid?</label>
        <select id="payerType">
          <option value="network" selected>Payment app / marketplace (PayPal, Venmo…)</option>
          <option value="card">Card payment (Stripe, Square, in-person)</option>
          <option value="direct">A business paying me directly (check/ACH/cash)</option>
        </select>
      </div>
      <div class="field">
        <label for="amount">Gross amount this year ($)</label>
        <input type="number" id="amount" inputmode="numeric" min="0" step="100" value="8000">
      </div>
      <div class="field" id="txnField">
        <label for="transactions">Number of transactions</label>
        <input type="number" id="transactions" inputmode="numeric" min="0" step="1" value="60">
      </div>
      <div class="field" id="natureField">
        <label for="paymentNature">What was it for?</label>
        <select id="paymentNature">
          <option value="business" selected>Goods & services / business</option>
          <option value="personal">Personal (bill split, gift, reimbursement)</option>
        </select>
      </div>
      <div class="field" id="purposeField">
        <label for="paymentPurpose">What was the direct payment for?</label>
        <select id="paymentPurpose">
          <option value="services" selected>Services / freelance work (1099-NEC)</option>
          <option value="rent_other">Rent or other income (1099-MISC)</option>
        </select>
      </div>
      <div class="field">
        <label for="state">Your state (optional)</label>
        <select id="state"><option value="">Not sure / skip</option></select>
      </div>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/1099-threshold-checker/" target="_blank" rel="noopener">1099-K / 1099-NEC Threshold Checker</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__FORM1099__ = {{FORM1099_JSON}};
  window.__FORM1099_STATES__ = {{FORM1099_STATES_JSON}};
</script>
<script type="module" src="/assets/1099-threshold-checker.js"></script>
</body>
</html>
