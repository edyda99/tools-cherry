<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>2026 State Supplemental (Bonus) Withholding Rates — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/data/state-supplemental-withholding-rates-2026/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin:0; padding:14px; background:transparent; }
  .embed-wrap { max-width:700px; margin:0 auto; }
  .embed-wrap h1 { font-size:1.15rem; margin:0 0 10px; }
  .table-tools { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin:0 0 8px; }
  .table-tools input[type=search] { flex:1 1 220px; min-width:170px; padding:8px 11px; border:1px solid var(--border-strong); border-radius:8px; font-size:.92rem; background:var(--surface); color:var(--text); }
  .table-tools .count { font-size:.82rem; opacity:.8; white-space:nowrap; }
  .table-scroll { overflow:auto; max-height:520px; border:1px solid rgba(128,128,128,.2); border-radius:10px; }
  table.study { border-collapse:collapse; width:100%; font-size:.85rem; min-width:540px; }
  table.study th, table.study td { text-align:left; padding:7px 9px; border-bottom:1px solid rgba(128,128,128,.18); vertical-align:top; }
  table.study thead th { position:sticky; top:0; background:var(--surface); cursor:pointer; white-space:nowrap; }
  table.study thead th[data-sort]::after { content:" \2195"; opacity:.35; font-size:.8em; }
  table.study td.rate { font-variant-numeric:tabular-nums; white-space:nowrap; font-weight:600; }
  .chip { display:inline-block; padding:2px 8px; border-radius:999px; font-size:.76rem; font-weight:600; white-space:nowrap; }
  .chip.m-flat { background:var(--accent-soft); color:var(--accent); }
  .chip.m-regular { background:rgba(128,128,128,.14); color:var(--muted); }
  .chip.m-none { background:#eaf1ff; color:#1d4ed8; }
  .chip.m-special { background:#fff3e0; color:#b26b00; }
  td.note { opacity:.85; font-size:.8rem; }
  td.note a { color:inherit; }
  .muted-small { opacity:.8; font-size:.82rem; }
  .embed-credit { margin-top:12px; text-align:center; font-size:.85rem; opacity:.9; }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>2026 state supplemental (bonus) withholding rates</h1>
  <div class="table-tools">
    <input type="search" data-filter-for="suppTable" placeholder="Search states — California, flat, Texas" aria-label="Search states">
    <span class="count"><strong data-filter-count="suppTable">{{ROW_COUNT}}</strong>/{{ROW_COUNT}}</span>
  </div>
  <div class="table-scroll">
    <table class="study" id="suppTable" data-datatable>
      <thead><tr>
        <th data-sort="text">State</th>
        <th data-sort="text">Method</th>
        <th data-sort="num">Rate (2026)</th>
        <th data-sort="text">Notes</th>
      </tr></thead>
      <tbody>{{TABLE_ROWS}}</tbody>
    </table>
  </div>
  <p class="muted-small">Plus federal flat 22% (37% over $1M/yr) &amp; 7.65% FICA. Source: state DOR guides + IRS Pub 15 (2026).</p>
  <p class="embed-credit">Source: <a href="{{SITE_URL}}/data/state-supplemental-withholding-rates-2026/" target="_blank" rel="noopener">2026 State Supplemental Withholding Rates</a> by {{SITE_NAME}}</p>
</div>
<script type="module" src="/assets/data-table.js"></script>
</body>
</html>
