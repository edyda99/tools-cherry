<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Dependent Care FSA vs. Child Care Credit Calculator — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/dependent-care-fsa-vs-credit-calculator/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 560px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .embed-credit { margin-top:14px; text-align:center; font-size:.85rem; opacity:.9; }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>Dependent Care FSA vs. Child Care Credit (2026)</h1>
  <section class="calc" aria-label="Dependent Care FSA vs. Child and Dependent Care Credit calculator">
    <form id="dcForm" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label for="filing">Filing status</label>
        <select id="filing">
          <option value="married">Married filing jointly</option>
          <option value="single">Single</option>
          <option value="head_of_household">Head of household</option>
          <option value="married_separate">Married filing separately</option>
        </select>
      </div>
      <div class="field">
        <label for="agi">Your yearly household income <span class="muted-small">(Form 1040 line 11)</span></label>
        <input type="text" id="agi" inputmode="decimal" data-money autocomplete="off" value="85000">
        <p class="muted-small" style="margin-top:6px">Before any FSA — combined if filing jointly.</p>
      </div>
      <div class="field">
        <label for="kids">Number of qualifying dependents</label>
        <select id="kids">
          <option value="1">1 (cap $3,000)</option>
          <option value="2" selected>2 or more (cap $6,000)</option>
        </select>
      </div>
      <div class="field">
        <label for="expenses">Annual dependent-care expenses ($)</label>
        <input type="text" id="expenses" inputmode="decimal" data-money autocomplete="off" value="6000">
      </div>
      <div class="field">
        <label for="employerFsa">Max your employer's FSA allows ($)</label>
        <input type="text" id="employerFsa" inputmode="decimal" data-money autocomplete="off" value="7500">
        <p class="muted-small" style="margin-top:6px">Capped at $7,500 ($3,750 MFS). No plan? Set to 0.</p>
      </div>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/dependent-care-fsa-vs-credit-calculator/" target="_blank" rel="noopener">Dependent Care FSA vs. Child Care Credit Calculator</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__DC__ = {{DC_JSON}};
  window.__FED__ = {{FED_JSON}};
</script>
<script type="module" src="/assets/dependent-care-fsa-vs-credit-calculator.js"></script>
</body>
</html>
