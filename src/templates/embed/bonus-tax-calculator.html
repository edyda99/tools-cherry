<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Bonus Tax Calculator by State — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/bonus-tax-calculator/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 620px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .obbba-out .line { display:flex; justify-content:space-between; gap:12px; padding:6px 0; border-bottom:1px solid rgba(128,128,128,.18); }
  .obbba-out .line.big { font-size:1.05rem; font-weight:700; border-bottom:2px solid rgba(128,128,128,.35); }
  .obbba-out .num { font-variant-numeric: tabular-nums; text-align:right; }
  .obbba-note { font-size:.85rem; opacity:.9; margin-top:8px; }
  .ok-flag { color:#2f6f4f; font-weight:700; }
  .bt-headline { margin:4px 0 12px; padding:11px 13px; border-radius:9px; font-size:.98rem; }
  .bt-headline.refund { border-left:4px solid #2f6f4f; background:rgba(47,111,79,.10); }
  .bt-headline.owe { border-left:4px solid #b26b00; background:rgba(178,107,0,.10); }
  .bt-headline.even { border-left:4px solid #4a6785; background:rgba(74,103,133,.10); }
  .bt-cols { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:6px; }
  .bt-col h3 { margin:0 0 6px; font-size:.95rem; }
  @media (max-width:600px){ .bt-cols { grid-template-columns:1fr; } }
  .embed-credit { margin-top:14px; text-align:center; font-size:.85rem; opacity:.9; }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>Bonus Tax Calculator by State</h1>
  <section class="calc" aria-label="Bonus tax calculator">
    <form id="bonusForm" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label for="bonus">Bonus amount (USD)</label>
        <input id="bonus" type="number" inputmode="decimal" min="0" step="any" value="10000">
      </div>
      <div class="field">
        <label for="state">State</label>
        <select id="state"></select>
      </div>
      <div class="field">
        <label for="regIncome">Your regular annual income (USD)</label>
        <input id="regIncome" type="number" inputmode="decimal" min="0" step="any" value="70000">
      </div>
      <div class="field">
        <label for="filingStatus">Filing status</label>
        <select id="filingStatus">
          <option value="single">Single / Married filing separately</option>
          <option value="married">Married filing jointly</option>
          <option value="head_of_household">Head of household</option>
        </select>
      </div>
      <div class="field" id="paymentTypeRow" style="display:none">
        <label for="paymentType">Payment type (California)</label>
        <select id="paymentType">
          <option value="bonus">Bonus / stock options (10.23%)</option>
          <option value="other">Other supplemental (6.6%)</option>
        </select>
      </div>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/bonus-tax-calculator/" target="_blank" rel="noopener">Bonus Tax Calculator by State</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__BONUS_TAX__ = {{BONUS_TAX_JSON}};
</script>
<script type="module" src="/assets/bonus-tax-calculator.js"></script>
</body>
</html>
