<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Senior Bonus Deduction Calculator — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/senior-deduction-calculator/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 560px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .embed-credit { margin-top:14px; text-align:center; font-size:.85rem; opacity:.9; }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>Senior Bonus Deduction Calculator (65+)</h1>
  <section class="calc" aria-label="Senior bonus deduction calculator">
    <form id="seniorForm" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label for="year">Tax year</label>
        <select id="year">
          <option value="2025">2025</option>
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028</option>
        </select>
      </div>
      <div class="field">
        <label for="filing">Filing status</label>
        <select id="filing">
          <option value="single">Single</option>
          <option value="married">Married filing jointly</option>
          <option value="married_separate">Married filing separately</option>
          <option value="head_of_household">Head of household</option>
          <option value="qss">Qualifying surviving spouse</option>
        </select>
      </div>
      <div class="field check-field">
        <input type="checkbox" id="age65" checked>
        <label for="age65">I will be <strong>65 or older on Dec 31</strong> of the tax year</label>
      </div>
      <div class="field check-field" id="spouseRow" hidden>
        <input type="checkbox" id="spouseAge65">
        <label for="spouseAge65">My spouse will be <strong>65 or older on Dec 31</strong></label>
      </div>
      <div class="field">
        <label for="magi">Your yearly income (Form 1040 line 11)</label>
        <input type="text" id="magi" inputmode="decimal" data-money autocomplete="off" value="60000">
        <p class="muted-small" style="margin-top:6px">Roughly your MAGI/AGI for most people.</p>
      </div>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/senior-deduction-calculator/" target="_blank" rel="noopener">Senior Bonus Deduction Calculator</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__OBBBA__ = {{OBBBA_JSON}};
  window.__FED__ = {{FED_JSON}};
</script>
<script type="module" src="/assets/senior-deduction-calculator.js"></script>
</body>
</html>
