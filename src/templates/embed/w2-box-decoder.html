<!doctype html>

<head>

<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 560px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .embed-wrap h2 { font-size: 1.05rem; }
  .obbba-out .line { display:flex; justify-content:space-between; gap:12px; padding:6px 0; border-bottom:1px solid rgba(128,128,128,.18); }
  .obbba-out .line.big { font-size:1rem; font-weight:700; border-bottom:2px solid rgba(128,128,128,.35); }
  .obbba-out .num { font-variant-numeric: tabular-nums; text-align:right; }
  .obbba-note { font-size:.82rem; opacity:.9; margin-top:8px; }
  .warn-flag { color:#b26b00; font-weight:700; }
  .ok-flag { color:#2f6f4f; font-weight:700; }
  .info-flag { color:#2a5d8f; font-weight:600; }
  .code-card { margin-top:10px; padding:10px 12px; border-left:4px solid #2a5d8f; border-radius:8px; background:rgba(42,93,143,.07); }
  .code-card.excluded { border-left-color:#2f6f4f; background:rgba(47,111,79,.08); }
  .code-card.included { border-left-color:#b26b00; background:rgba(178,107,0,.07); }
  .code-card h3 { margin:0 0 4px; font-size:.95rem; }
  .code-card p { margin:5px 0; font-size:.84rem; }
  .code-badge { display:inline-block; padding:1px 7px; border-radius:6px; font-size:.72rem; font-weight:700; margin-left:6px; }
  .code-badge.b-excluded { background:rgba(47,111,79,.18); color:#2f6f4f; }
  .code-badge.b-included { background:rgba(178,107,0,.16); color:#b26b00; }
  .takeaway { margin-top:12px; padding:10px 12px; border-left:4px solid #2f6f4f; border-radius:8px; background:rgba(47,111,79,.09); font-size:.82rem; }
  .ttoc-result { margin-top:8px; }
  .ttoc-hit { padding:9px 11px; border:1px solid rgba(128,128,128,.25); border-radius:8px; margin-top:8px; font-size:.85rem; }
  .ttoc-hit .t-code { font-weight:700; font-variant-numeric: tabular-nums; }
  .ttoc-hit .t-cat { font-size:.78rem; opacity:.8; }
  .ttoc-hit .t-desc { font-size:.82rem; margin-top:4px; }
  .ttoc-hit .t-ex { font-size:.8rem; opacity:.9; margin-top:3px; }
  .ttoc-notfound { padding:10px 12px; border-left:4px solid #b26b00; border-radius:8px; background:rgba(178,107,0,.08); margin-top:8px; font-size:.84rem; }

<body>
<div class="embed-wrap">
  <h1>W-2 Box 12 Decoder (TA, TP, TT) &amp; Tipped Occupation Lookup</h1>
  <section class="calc" aria-label="W-2 Box 12 and Box 14b decoder">
    <form id="w2Form" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label for="amtTP">Box 12 code TP amount ($) — reported tips</label>
        <input type="number" id="amtTP" inputmode="numeric" min="0" step="100" value="9800">
      </div>
      <div class="field">
        <label for="amtTT">Box 12 code TT amount ($) — overtime premium</label>
        <input type="number" id="amtTT" inputmode="numeric" min="0" step="100" value="1150">
      </div>
      <div class="field">
        <label for="amtTA">Box 12 code TA amount ($) — Trump account</label>
        <input type="number" id="amtTA" inputmode="numeric" min="0" step="100" value="2500">
      </div>
      <div class="field">
        <label for="codes14b">Box 14b code(s) — up to two</label>
        <input type="text" id="codes14b" inputmode="numeric" placeholder="e.g. 101 — or 101, 000" value="101">
      </div>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
  </section>

  <section class="calc" aria-label="Tipped occupation code lookup">
    <h2>Is your job on the no-tax-on-tips list?</h2>
    <div class="field">
      <label for="occQuery">Your job title</label>
      <input type="text" id="occQuery" placeholder="e.g. bartender, nail tech, uber driver" value="">
    </div>
    <div class="ttoc-result" id="occOut" aria-live="polite"></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/w2-box-decoder/" target="_blank" rel="noopener">W-2 Box 12 Decoder &amp; Tipped Occupation Lookup</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__TTOC__ = {{TTOC_JSON}};
</script>
<script type="module" src="/assets/w2-box-decoder.js"></script>

</html>
