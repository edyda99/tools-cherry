<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>W-4 Overtime &amp; Tips Withholding Calculator — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/w4-overtime-tips-withholding-calculator/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 560px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .embed-credit { margin-top:14px; text-align:center; font-size:.85rem; opacity:.9; }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>W-4 Overtime &amp; Tips Withholding Calculator (2026)</h1>
  <section class="calc" aria-label="W-4 overtime and tips withholding calculator">
    <form id="w4Form" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label for="filing">Filing status</label>
        <select id="filing">
          <option value="single">Single</option>
          <option value="married">Married filing jointly</option>
          <option value="head_of_household">Head of household</option>
        </select>
      </div>
      <div class="field">
        <label for="income">Total expected 2026 income (all sources)</label>
        <input type="text" id="income" inputmode="decimal" data-money autocomplete="off" value="52000">
      </div>
      <div class="field">
        <label for="freq">How often are you paid?</label>
        <select id="freq">
          <option value="weekly">Weekly (52)</option>
          <option value="biweekly">Every two weeks (26)</option>
          <option value="semimonthly">Twice a month (24)</option>
          <option value="monthly">Monthly (12)</option>
        </select>
      </div>
      <div class="field">
        <label for="tips">Expected qualified tips for the year ($)</label>
        <input type="text" id="tips" inputmode="decimal" data-money autocomplete="off" value="0">
      </div>
      <div class="field">
        <label>Your overtime</label>
        <div class="ot-modes" role="radiogroup" aria-label="How to enter overtime">
          <label><input type="radio" name="otmode" value="hours" checked> Hours &amp; rate</label>
          <label><input type="radio" name="otmode" value="premium"> I know my premium</label>
        </div>
        <div id="ot-hours">
          <div class="ot-row">
            <div class="field" style="margin:0">
              <label for="otrate" class="muted-small">Regular rate ($/hr)</label>
              <input type="text" id="otrate" inputmode="decimal" data-money autocomplete="off" value="20">
            </div>
            <div class="field" style="margin:0">
              <label for="othours" class="muted-small">Overtime hours / year</label>
              <input type="number" id="othours" inputmode="numeric" min="0" step="10" value="300">
            </div>
          </div>
          <p class="muted-small" style="margin-top:6px">Only the premium (the extra half) counts: ½ &times; rate &times; hours.</p>
        </div>
        <div id="ot-premium" hidden>
          <label for="otpremium" class="muted-small">Overtime premium for the year ($) — the "half" portion</label>
          <input type="text" id="otpremium" inputmode="decimal" data-money autocomplete="off" value="3000">
        </div>
      </div>
      <details class="field">
        <summary>Adjusting part-way through the year? (optional)</summary>
        <div style="margin-top:10px">
          <label for="months" class="muted-small">Months left in 2026 when you file the new W-4</label>
          <input type="number" id="months" inputmode="numeric" min="1" max="12" step="1" value="12">
        </div>
      </details>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/w4-overtime-tips-withholding-calculator/" target="_blank" rel="noopener">W-4 Overtime &amp; Tips Withholding Calculator</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__OBBBA__ = {{OBBBA_JSON}};
  window.__FED__ = {{FED_JSON}};
</script>
<script type="module" src="/assets/w4-overtime-tips-withholding-calculator.js"></script>
</body>
</html>
