<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Adoption Tax Credit Calculator — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/adoption-credit-calculator/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 560px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .warn-flag { color:#b26b00; font-weight:700; }
  .ok-flag { color:#2f6f4f; font-weight:700; }
  .info-note { margin-top:10px; padding:10px 12px; border-left:4px solid #2a5d8f; border-radius:8px; background:rgba(42,93,143,.09); font-size:.82rem; }
  .childcard { margin-top:10px; padding:10px 12px; border:1px solid rgba(128,128,128,.28); border-radius:10px; }
  .childcard h3 { margin:0 0 6px; font-size:.95rem; }
  .childbreak { margin-top:10px; font-size:.82rem; }
  .childbreak table { width:100%; border-collapse:collapse; }
  .childbreak th, .childbreak td { padding:5px 8px; border-bottom:1px solid rgba(128,128,128,.18); text-align:right; }
  .childbreak th:first-child, .childbreak td:first-child { text-align:left; }
  .embed-credit { margin-top:14px; text-align:center; font-size:.85rem; opacity:.9; }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>Adoption Tax Credit Calculator (2026)</h1>
  <section class="calc" aria-label="Adoption tax credit calculator">
    <form id="adoptForm" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label for="taxYear">Tax year</label>
        <select id="taxYear">
          <option value="2026" selected>2026</option>
          <option value="2025">2025</option>
        </select>
      </div>
      <div class="field">
        <label for="filingStatus">Filing status</label>
        <select id="filingStatus">
          <option value="single" selected>Single</option>
          <option value="mfj">Married filing jointly</option>
          <option value="hoh">Head of household</option>
          <option value="qw">Qualifying surviving spouse</option>
          <option value="mfs">Married filing separately</option>
        </select>
      </div>
      <div class="field" id="mfsField" style="display:none">
        <label for="livedApart">MFS: lived apart from spouse last 6 months (and child in your home &gt; half the year)?</label>
        <select id="livedApart">
          <option value="no" selected>No</option>
          <option value="yes">Yes</option>
        </select>
      </div>
      <div class="field">
        <label for="childCount">How many children being adopted this year?</label>
        <select id="childCount">
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </div>
      <div id="children"></div>
      <div class="field">
        <label for="magi">Your yearly income <span class="muted-small">(Form 1040 line 11)</span></label>
        <input type="text" id="magi" inputmode="decimal" data-money autocomplete="off" value="120000">
      </div>
      <div class="field">
        <label for="taxLiability">Federal income tax before this credit ($)</label>
        <input type="text" id="taxLiability" inputmode="decimal" data-money autocomplete="off" value="8000">
      </div>
      <details style="margin-top:8px">
        <summary class="muted-small">Employer adoption assistance (§137)?</summary>
        <div class="field" style="margin-top:8px">
          <label for="hasProgram">Employer has a written adoption-assistance program?</label>
          <select id="hasProgram">
            <option value="no" selected>No</option>
            <option value="yes">Yes</option>
          </select>
        </div>
        <div id="employerFields" style="display:none">
          <div class="field">
            <label for="employerBenefits">Employer benefits paid/excluded this year ($)</label>
            <input type="text" id="employerBenefits" inputmode="decimal" data-money autocomplete="off" value="0">
          </div>
        </div>
      </details>
      <details style="margin-top:8px">
        <summary class="muted-small">Carryforward from a prior year?</summary>
        <div class="field" style="margin-top:8px">
          <label for="cfAmount">Nonrefundable credit carried into this year ($)</label>
          <input type="text" id="cfAmount" inputmode="decimal" data-money autocomplete="off" value="0">
        </div>
        <div class="field">
          <label for="cfYear">Year that carryforward arose</label>
          <input type="number" id="cfYear" inputmode="numeric" min="2018" max="2030" step="1" value="2025">
        </div>
      </details>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/adoption-credit-calculator/" target="_blank" rel="noopener">Adoption Tax Credit Calculator</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__ADOPTION_DATA__ = {{ADOPTION_DATA_JSON}};
</script>
<script type="module" src="/assets/adoption-credit-calculator.js"></script>
</body>
</html>
