<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Car Loan Interest Deduction Calculator — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/car-loan-interest-calculator/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 560px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .obbba-out .line { display:flex; justify-content:space-between; gap:12px; padding:6px 0; border-bottom:1px solid rgba(128,128,128,.18); }
  .obbba-out .line.big { font-size:1.1rem; font-weight:700; border-bottom:2px solid rgba(128,128,128,.35); }
  .obbba-out .num { font-variant-numeric: tabular-nums; }
  .obbba-note { font-size:.85rem; opacity:.85; margin-top:8px; }
  .phaseout-flag { color:#b26b00; font-weight:600; }
  .ineligible-flag { color:#b23a00; font-weight:600; }
  .loan-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .elig { margin:0; padding:0; list-style:none; }
  .elig li { display:flex; gap:8px; align-items:flex-start; padding:5px 0; font-size:.9rem; }
  .elig input { margin-top:3px; flex:0 0 auto; width:16px; height:16px; }
  .embed-credit { margin-top:14px; text-align:center; font-size:.85rem; opacity:.9; }
  @media (max-width:520px){ .loan-row { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>Car Loan Interest Deduction Calculator (2025–2028)</h1>
  <section class="calc" aria-label="Car loan interest deduction calculator">
    <form id="carForm" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label for="year">Tax year</label>
        <select id="year">
          <option value="2025">2025</option>
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028</option>
        </select>
      </div>
      <div class="field">
        <label for="filing">Filing status</label>
        <select id="filing">
          <option value="single">Single</option>
          <option value="married">Married filing jointly</option>
          <option value="married_separate">Married filing separately</option>
          <option value="head_of_household">Head of household</option>
        </select>
      </div>
      <div class="field">
        <label for="magi">Adjusted gross income (AGI / MAGI)</label>
        <input type="number" id="magi" inputmode="numeric" min="0" step="1000" value="90000">
        <p class="muted-small" style="margin-top:6px">Roughly Form 1040 line 11 — combined income if filing jointly.</p>
      </div>
      <div class="field">
        <label>Your car loan</label>
        <div class="loan-row">
          <div class="field" style="margin:0">
            <label for="amount" class="muted-small">Amount ($)</label>
            <input type="number" id="amount" inputmode="numeric" min="0" step="500" value="40000">
          </div>
          <div class="field" style="margin:0">
            <label for="apr" class="muted-small">APR (%)</label>
            <input type="number" id="apr" inputmode="decimal" min="0" step="0.1" value="6.5">
          </div>
          <div class="field" style="margin:0">
            <label for="term" class="muted-small">Term (months)</label>
            <input type="number" id="term" inputmode="numeric" min="1" step="12" value="60">
          </div>
        </div>
      </div>
      <div class="field">
        <label>Qualifies? Check each that is true:</label>
        <ul class="elig">
          <li><input type="checkbox" id="e-new" checked><label for="e-new">New vehicle (not used or a lease buyout)</label></li>
          <li><input type="checkbox" id="e-usa" checked><label for="e-usa">Final assembly in the United States</label></li>
          <li><input type="checkbox" id="e-origin" checked><label for="e-origin">Loan taken out in 2025 or later</label></li>
          <li><input type="checkbox" id="e-personal" checked><label for="e-personal">Personal use, financed with a loan (not a lease)</label></li>
        </ul>
      </div>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/car-loan-interest-calculator/" target="_blank" rel="noopener">Car Loan Interest Deduction Calculator</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__OBBBA__ = {{OBBBA_JSON}};
  window.__FED__ = {{FED_JSON}};
</script>
<script type="module" src="/assets/car-loan-interest-calculator.js"></script>
</body>
</html>
