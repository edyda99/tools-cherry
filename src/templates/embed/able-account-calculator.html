<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>ABLE Account Contribution Limit Calculator — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/able-account-calculator/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 560px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .warn-flag { color:#b26b00; font-weight:700; }
  .ok-flag { color:#2f6f4f; font-weight:700; }
  .info-note { margin-top:10px; padding:10px 12px; border-left:4px solid #2a5d8f; border-radius:8px; background:rgba(42,93,143,.09); font-size:.82rem; }
  .pools { margin-top:10px; }
  .pool-row { margin-top:8px; }
  .pool-label { display:flex; justify-content:space-between; gap:12px; font-size:.8rem; margin-bottom:4px; }
  .pool-bar { height:9px; border-radius:6px; background:rgba(128,128,128,.18); overflow:hidden; }
  .pool-fill { height:100%; border-radius:6px; background:#2f6f4f; }
  .pool-fill.pool-over { background:#b26b00; }
  .embed-credit { margin-top:14px; text-align:center; font-size:.85rem; opacity:.9; }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>ABLE Account Contribution Limit Calculator (2026)</h1>
  <section class="calc" aria-label="ABLE account contribution limit calculator">
    <form id="ableForm" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label for="onsetGate">How old was the beneficiary when the disability or blindness began?</label>
        <select id="onsetGate">
          <option value="before46" selected>Younger than 46</option>
          <option value="age46plus">46 or older</option>
        </select>
      </div>
      <div id="calcFields">
        <div class="field">
          <label for="state">Beneficiary's state of residence</label>
          <select id="state"></select>
        </div>
        <div class="field">
          <label for="employed">W-2 or self-employment income in 2026?</label>
          <select id="employed">
            <option value="no" selected>No</option>
            <option value="yes">Yes</option>
          </select>
        </div>
        <div id="employedFields" style="display:none">
          <div class="field">
            <label for="compensation">Beneficiary's compensation for 2026 ($)</label>
            <input type="text" id="compensation" inputmode="decimal" data-money autocomplete="off" value="0">
          </div>
          <div class="field">
            <label for="planContribution">Any workplace retirement plan money this year — incl. employer match — 401(k), 403(b), 457(b)?</label>
            <select id="planContribution">
              <option value="no" selected>No</option>
              <option value="yes">Yes</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="others">From family, friends, trusts &amp; others ($)</label>
          <input type="text" id="others" inputmode="decimal" data-money autocomplete="off" value="10000">
        </div>
        <div class="field">
          <label for="own">From the beneficiary themself ($)</label>
          <input type="text" id="own" inputmode="decimal" data-money autocomplete="off" value="0">
        </div>
        <details style="margin-top:8px">
          <summary class="muted-small">529→ABLE rollover this year?</summary>
          <div class="field" style="margin-top:8px">
            <label for="rollover529">529→ABLE rollover amount ($)</label>
            <input type="text" id="rollover529" inputmode="decimal" data-money autocomplete="off" value="0">
          </div>
        </details>
      </div>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/able-account-calculator/" target="_blank" rel="noopener">ABLE Account Contribution Limit Calculator</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__ABLE_LIMITS__ = {{ABLE_LIMITS_JSON}};
  window.__ABLE_STATES__ = {{ABLE_STATES_JSON}};
</script>
<script type="module" src="/assets/able-account-calculator.js"></script>
</body>
</html>
