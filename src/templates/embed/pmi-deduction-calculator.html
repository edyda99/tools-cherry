<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>PMI / Mortgage Insurance Deduction Calculator — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/pmi-deduction-calculator/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 560px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .embed-credit { margin-top:14px; text-align:center; font-size:.85rem; opacity:.9; }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>PMI / Mortgage Insurance Deduction Calculator (2026)</h1>
  <section class="calc" aria-label="PMI / mortgage insurance deduction calculator">
    <form id="mipForm" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label for="filing">Filing status</label>
        <select id="filing">
          <option value="single">Single</option>
          <option value="married">Married filing jointly</option>
          <option value="married_separate">Married filing separately</option>
          <option value="head_of_household">Head of household</option>
        </select>
      </div>
      <div class="field">
        <label for="agi">Your yearly income <span class="muted-small">(Form 1040 line 11)</span></label>
        <input type="text" id="agi" inputmode="decimal" data-money autocomplete="off" value="95000">
      </div>
      <div class="field">
        <label for="miType">Mortgage insurance type</label>
        <select id="miType">
          <option value="monthly_pmi">Monthly PMI (conventional)</option>
          <option value="fha">FHA (annual MIP, optional UFMIP)</option>
          <option value="va">VA funding fee</option>
          <option value="usda">USDA guarantee fee</option>
        </select>
      </div>
      <div class="field">
        <label for="recurring">Premiums paid during 2026 ($)</label>
        <input type="text" id="recurring" inputmode="decimal" data-money autocomplete="off" value="1800">
      </div>
      <div class="field est-row" id="upfrontFields">
        <div class="field" style="margin:0">
          <label for="upfront">Upfront premium ($) <span class="muted-small">(optional)</span></label>
          <input type="text" id="upfront" inputmode="decimal" data-money autocomplete="off" value="0">
        </div>
        <div class="field" style="margin:0">
          <label for="closingMonth">Closing month</label>
          <select id="closingMonth">
            <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
            <option value="4">Apr</option><option value="5">May</option><option value="6" selected>Jun</option>
            <option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option>
            <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
          </select>
        </div>
      </div>
      <div class="field" id="termField">
        <label for="termMonths">Loan term</label>
        <select id="termMonths">
          <option value="360" selected>30 years</option>
          <option value="180">15 years</option>
          <option value="240">20 years</option>
          <option value="84">84 months or less</option>
        </select>
      </div>
      <p class="muted-small" id="upfrontHint" style="margin-top:-6px"></p>
      <div class="field">
        <label for="contract2007"><input type="checkbox" id="contract2007" checked style="width:auto;margin-right:8px"> Contract issued 2007 or later</label>
      </div>
      <div class="field">
        <label for="other">Other itemized deductions ($)</label>
        <input type="text" id="other" inputmode="decimal" data-money autocomplete="off" value="20000">
      </div>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/pmi-deduction-calculator/" target="_blank" rel="noopener">PMI / Mortgage Insurance Deduction Calculator</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__OBBBA__ = {{OBBBA_JSON}};
  window.__FED__ = {{FED_JSON}};
</script>
<script type="module" src="/assets/pmi-deduction-calculator.js"></script>
</body>
</html>
