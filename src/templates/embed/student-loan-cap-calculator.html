<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Federal Student Loan Cap Calculator — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/student-loan-cap-calculator/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 560px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .obbba-out .line { display:flex; justify-content:space-between; gap:12px; padding:6px 0; border-bottom:1px solid rgba(128,128,128,.18); }
  .obbba-out .line.big { font-size:1.05rem; font-weight:700; border-bottom:2px solid rgba(128,128,128,.35); }
  .obbba-out .num { font-variant-numeric: tabular-nums; text-align:right; }
  .obbba-note { font-size:.82rem; opacity:.9; margin-top:8px; }
  .warn-flag { color:#b26b00; font-weight:700; }
  .ok-flag { color:#2f6f4f; font-weight:700; }
  .info-flag { color:#2a5d8f; font-weight:600; }
  .takeaway { margin-top:10px; padding:10px 12px; border-left:4px solid #2f6f4f; border-radius:8px; background:rgba(47,111,79,.09); font-size:.82rem; }
  .litigation-note { margin-top:10px; padding:10px 12px; border-left:4px solid #2a5d8f; border-radius:8px; background:rgba(42,93,143,.09); font-size:.82rem; }
  .legacy-banner { margin-top:10px; padding:10px 12px; border-left:4px solid #6b4fa1; border-radius:8px; background:rgba(107,79,161,.09); font-size:.82rem; }
  .yr-table { width:100%; border-collapse:collapse; margin-top:10px; font-size:.82rem; }
  .yr-table th, .yr-table td { padding:5px 6px; text-align:right; border-bottom:1px solid rgba(128,128,128,.18); }
  .yr-table th:first-child, .yr-table td:first-child { text-align:left; }
  .yr-table td.num { font-variant-numeric: tabular-nums; }
  .yr-scroll { overflow-x:auto; }
  .embed-credit { margin-top:14px; text-align:center; font-size:.85rem; opacity:.9; }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>Federal Student Loan Cap Calculator (2026)</h1>
  <section class="calc" aria-label="Federal student loan cap calculator">
    <form id="slcForm" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label for="mode">Who is borrowing?</label>
        <select id="mode">
          <option value="graduate" selected>Graduate student ($20,500/yr, $100,000 pool)</option>
          <option value="professional">Professional student ($50,000/yr, $200,000 pool)</option>
          <option value="parentPlus">Parent (Parent PLUS, $20,000/yr, $65,000 per student)</option>
          <option value="undergradInfo">Undergraduate (own loans — limits unchanged)</option>
        </select>
      </div>
      <div id="studentFields">
        <div class="field">
          <label for="yearsRemaining">Years remaining in the program</label>
          <select id="yearsRemaining">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </div>
        <div class="field">
          <label for="annualCoa">Cost of attendance per year ($)</label>
          <input type="number" id="annualCoa" inputmode="numeric" min="0" step="1000" value="60000">
        </div>
        <div class="field">
          <label for="annualOtherAid">Grants, scholarships &amp; other aid per year ($)</label>
          <input type="number" id="annualOtherAid" inputmode="numeric" min="0" step="500" value="0">
        </div>
        <div class="field" id="poolField">
          <label for="priorPoolOutstanding">Outstanding Direct Unsubsidized principal from prior grad/professional study ($)</label>
          <input type="number" id="priorPoolOutstanding" inputmode="numeric" min="0" step="1000" value="0">
        </div>
        <div class="field" id="everProfField">
          <label for="everProfessional"><input type="checkbox" id="everProfessional"> I am (or have been) a professional student too</label>
        </div>
        <div class="field" id="lifetimeField">
          <label for="lifetimeEverBorrowed">All federal student loans EVER borrowed for your own education ($, incl. repaid)</label>
          <input type="number" id="lifetimeEverBorrowed" inputmode="numeric" min="0" step="1000" value="0">
        </div>
      </div>
      <div id="parentFields" style="display:none">
        <div class="field">
          <label for="parentPlusEverBorrowed">Parent PLUS ever borrowed for THIS student, all parents combined ($)</label>
          <input type="number" id="parentPlusEverBorrowed" inputmode="numeric" min="0" step="1000" value="0">
        </div>
      </div>
      <div id="undergradFields" style="display:none">
        <div class="field">
          <label for="ugDependency">Dependency status</label>
          <select id="ugDependency">
            <option value="dependent" selected>Dependent undergraduate</option>
            <option value="independent">Independent undergraduate</option>
          </select>
        </div>
        <div class="field">
          <label for="ugYear">Year of study</label>
          <select id="ugYear">
            <option value="1">First year</option>
            <option value="2" selected>Second year</option>
            <option value="3">Third year and beyond</option>
          </select>
        </div>
      </div>
      <div class="field" id="legacyField">
        <label for="legacyEligible"><input type="checkbox" id="legacyEligible"> <span id="legacyLabel">I was enrolled in this program on June 30, 2026 AND a Direct Loan was made for it before July 1, 2026</span></label>
      </div>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/student-loan-cap-calculator/" target="_blank" rel="noopener">Federal Student Loan Cap Calculator</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__STUDENT_LOAN_LIMITS__ = {{STUDENT_LOAN_LIMITS_JSON}};
</script>
<script type="module" src="/assets/student-loan-cap-calculator.js"></script>
</body>
</html>
