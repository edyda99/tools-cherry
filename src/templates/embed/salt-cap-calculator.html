<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>SALT Cap Calculator — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/salt-cap-calculator/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 560px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .obbba-out .line { display:flex; justify-content:space-between; gap:12px; padding:6px 0; border-bottom:1px solid rgba(128,128,128,.18); }
  .obbba-out .line.big { font-size:1.1rem; font-weight:700; border-bottom:2px solid rgba(128,128,128,.35); }
  .obbba-out .num { font-variant-numeric: tabular-nums; }
  .obbba-note { font-size:.85rem; opacity:.85; margin-top:8px; }
  .phaseout-flag { color:#b26b00; font-weight:600; }
  .ineligible-flag { color:#b23a00; font-weight:600; }
  .torpedo-warn { margin-top:10px; padding:12px 14px; border-left:4px solid #b23a00; border-radius:8px; background:rgba(178,58,0,.08); font-size:.9rem; }
  .est-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .embed-credit { margin-top:14px; text-align:center; font-size:.85rem; opacity:.9; }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>SALT Cap Calculator (2025–2026)</h1>
  <section class="calc" aria-label="SALT deduction cap calculator">
    <form id="saltForm" autocomplete="off" onsubmit="return false">
      <div class="field">
        <label for="year">Tax year</label>
        <select id="year">
          <option value="2025">2025</option>
          <option value="2026">2026</option>
        </select>
      </div>
      <div class="field">
        <label for="filing">Filing status</label>
        <select id="filing">
          <option value="single">Single</option>
          <option value="married">Married filing jointly</option>
          <option value="married_separate">Married filing separately</option>
          <option value="head_of_household">Head of household</option>
        </select>
      </div>
      <div class="field">
        <label for="magi">Adjusted gross income (AGI / MAGI)</label>
        <input type="number" id="magi" inputmode="numeric" min="0" step="1000" value="300000">
        <p class="muted-small" style="margin-top:6px">Roughly Form 1040 line 11 — combined income if filing jointly.</p>
      </div>
      <div class="field est-row">
        <div class="field" style="margin:0">
          <label for="incomeTax">State &amp; local income tax paid ($)</label>
          <input type="number" id="incomeTax" inputmode="numeric" min="0" step="100" value="28000">
        </div>
        <div class="field" style="margin:0">
          <label for="propTax">Property tax paid ($)</label>
          <input type="number" id="propTax" inputmode="numeric" min="0" step="100" value="20000">
        </div>
      </div>
      <div class="field">
        <label for="other">Other itemized deductions <span class="muted-small">(optional)</span></label>
        <input type="number" id="other" inputmode="numeric" min="0" step="100" value="10000">
      </div>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
    <div class="torpedo-warn" id="torpedo" hidden></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/salt-cap-calculator/" target="_blank" rel="noopener">SALT Cap Calculator</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__OBBBA__ = {{OBBBA_JSON}};
  window.__FED__ = {{FED_JSON}};
</script>
<script type="module" src="/assets/salt-cap-calculator.js"></script>
</body>
</html>
