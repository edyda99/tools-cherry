<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>QCD vs. Charitable Deduction Calculator — Tools Berry (embed)</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="{{SITE_URL}}/qcd-vs-charitable-deduction-calculator/">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin: 0; padding: 14px; background: transparent; }
  .embed-wrap { max-width: 560px; margin: 0 auto; }
  .embed-wrap h1 { font-size: 1.25rem; margin: 0 0 10px; }
  .embed-credit { margin-top:14px; text-align:center; font-size:.85rem; opacity:.9; }
</style>
</head>
<body>
<div class="embed-wrap">
  <h1>QCD vs. Charitable Deduction Calculator (2026)</h1>
  <section class="calc" aria-label="QCD vs. charitable deduction calculator">
    <form id="qcdForm" autocomplete="off" onsubmit="return false">
      <div class="field est-row">
        <div class="field" style="margin:0">
          <label for="filing">Filing status</label>
          <select id="filing">
            <option value="single">Single</option>
            <option value="married">Married filing jointly</option>
            <option value="head_of_household">Head of household</option>
          </select>
        </div>
        <div class="field" style="margin:0">
          <label for="age">Your age</label>
          <input type="number" id="age" inputmode="decimal" min="0" max="120" step="0.5" value="75">
        </div>
      </div>
      <div class="field" id="spouseWrap">
        <label style="display:flex; align-items:center; gap:8px; font-weight:400">
          <input type="checkbox" id="spouseAge65" style="width:auto">
          My spouse is also 65 or older
        </label>
      </div>
      <div class="field">
        <label for="donation">Amount you want to give ($)</label>
        <input type="text" id="donation" inputmode="decimal" data-money autocomplete="off" value="10000">
      </div>
      <div class="field">
        <label for="agi">Your yearly income <span class="muted-small">(excluding this distribution)</span></label>
        <input type="text" id="agi" inputmode="decimal" data-money autocomplete="off" value="60000">
      </div>
      <div class="field est-row">
        <div class="field" style="margin:0">
          <label for="other">Other itemized ($) <span class="muted-small">(optional)</span></label>
          <input type="text" id="other" inputmode="decimal" data-money autocomplete="off" value="0">
        </div>
        <div class="field" style="margin:0">
          <label for="accountType">Account type</label>
          <select id="accountType">
            <option value="traditional_ira">Traditional IRA</option>
            <option value="inactive_sep_ira">Inactive SEP IRA</option>
            <option value="inactive_simple_ira">Inactive SIMPLE IRA</option>
            <option value="roth_ira">Roth IRA</option>
            <option value="401k">401(k) / 403(b) / 457</option>
          </select>
        </div>
      </div>
      <div class="field est-row">
        <div class="field" style="margin:0">
          <label for="rmd">This year's RMD ($) <span class="muted-small">(optional)</span></label>
          <input type="text" id="rmd" inputmode="decimal" data-money autocomplete="off" value="0">
        </div>
        <div class="field" style="margin:0">
          <label for="offset">Post-70½ deducted contribs ($) <span class="muted-small">(optional)</span></label>
          <input type="text" id="offset" inputmode="decimal" data-money autocomplete="off" value="0">
        </div>
      </div>
    </form>
    <div class="obbba-out" id="out" aria-live="polite"></div>
  </section>
  <p class="embed-credit">Free <a href="{{SITE_URL}}/qcd-vs-charitable-deduction-calculator/" target="_blank" rel="noopener">QCD vs. Charitable Deduction Calculator</a> by {{SITE_NAME}}</p>
</div>

<script>
  window.__OBBBA__ = {{OBBBA_JSON}};
  window.__FED__ = {{FED_JSON}};
</script>
<script type="module" src="/assets/qcd-vs-charitable-deduction-calculator.js"></script>
</body>
</html>
